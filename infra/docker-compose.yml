services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: stamped
      POSTGRES_PASSWORD: stamped
      POSTGRES_DB: stamped_l6
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stamped -d stamped_l6"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - stamped_l6_pg:/var/lib/postgresql/data

  api:
    image: node:22.14.0-bookworm
    working_dir: /app
    command: bash -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @stamped/l6-api db:migrate && pnpm --filter @stamped/l6-api dev"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgres://stamped:stamped@postgres:5432/stamped_l6
      REQUIRE_DATABASE: "true"
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: node:22.14.0-bookworm
    working_dir: /app
    command: bash -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @stamped/l6-worker start"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://stamped:stamped@postgres:5432/stamped_l6
      LOG_LEVEL: info
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  web:
    image: node:22.14.0-bookworm
    working_dir: /app
    command: bash -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @stamped/l6-web dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_BFF_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      - api

  # Fake email capture for invite/reset flows (Phase B). Mailpit SMTP :1025, UI :8025.
  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  stamped_l6_pg:
